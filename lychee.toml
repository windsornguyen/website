# Lychee link checker config
# Docs: https://lychee.cli.rs/usage/config/

max_concurrency = 64
max_retries = 3
retry_wait_time = 2
timeout = 30

cache = true
max_cache_age = "1d"

include_fragments = false
require_https = false
max_redirects = 10
exclude_all_private = true

exclude = [
  "^https://x\\.com/",
  "^https://twitter\\.com/",
  "^https://linkedin\\.com/",
  "^https://www\\.linkedin\\.com/",
  "^mailto:",
  "^https://localhost",
  "^http://localhost",
]
