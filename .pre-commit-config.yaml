# Pre-commit hooks (run via prek)
#
# Setup: uvx prek install
# Run:   uvx prek run --all-files

repos:
  # Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.29.1
    hooks:
      - id: gitleaks

  # GitHub Actions lint
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  # YAML lint
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: ["-d", "{extends: relaxed, rules: {line-length: disable}}"]
        files: \.(yml|yaml)$
        exclude: ^node_modules/

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # oxlint
  - repo: local
    hooks:
      - id: oxlint
        name: oxlint
        entry: pnpm exec oxlint
        language: system
        files: \.(ts|tsx|js|jsx)$
        exclude: ^(node_modules/|src/routeTree\.gen\.ts)

  # oxfmt
  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt
        entry: pnpm exec oxfmt --write
        language: system
        files: \.(ts|tsx|js|jsx)$
        exclude: ^(node_modules/|src/routeTree\.gen\.ts)
